<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
    <style>
        body {
            background: linear-gradient(to right, #ffecd2, #fcb69f);
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .container {
            width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 2px 2px 10px gray;
        }
        #chatbox {
            border:1px solid black;
            height: 300px;
            overflow:auto;
            padding: 10px;
            margin-bottom: 10px;
            text-align: left;
        }
        input[type="text"] {
            width: 75%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            width: 20%;
            padding: 10px;
            border-radius: 5px;
            background: #ff7e5f;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #ff512f;
        }
        img { margin-bottom: 10px; border-radius: 10px; }
        .message-left { background-color: #e1f5fe; padding: 5px 10px; border-radius: 10px; margin-bottom: 5px; max-width: 70%; }
        .message-right { background-color: #a0e7a0; padding: 5px 10px; border-radius: 10px; margin-bottom: 5px; max-width: 70%; margin-left: auto; text-align: right; }
    </style>
</head>
<body>
    <div class="container">
        <h3>Chat with: {{ other_user }}</h3>

        {% if image %}
            <h4>Food Image:</h4>
            <img src="{{ url_for('static', filename='uploads/' + image) }}" width="300"><br>
        {% endif %}

        <div id="chatbox">
            {% for c in chats %}
                {% if c.sender == current_user %}
                    <div class="message-right"><strong>{{ c.sender }}:</strong> {{ c.message }}</div>
                {% elif c.receiver == current_user %}
                    <div class="message-left"><strong>{{ c.sender }}:</strong> {{ c.message }}</div>
                {% endif %}
            {% endfor %}
        </div>

        <form method="post">
            <input type="text" name="chat_message" placeholder="Type your message" required>
            <input type="hidden" name="chat_receiver" value="{{ other_user }}">
            <button type="submit">Send</button>
        </form>
    </div>
</body>
</html>
