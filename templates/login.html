<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            text-align: center;
            color: white;
            margin:0;
            padding:0;
        }
        h2 { margin-top: 50px; }
        form {
            display: inline-block;
            margin-top: 30px;
            padding: 30px;
            background-color: rgba(0,0,0,0.5);
            border-radius: 20px;
        }
        input, button {
            width: 250px;
            margin: 10px 0;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
        }
        button {
            background-color: #ff6a00;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #ffb347; }
        p a { color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Login</h2>
    <form method="post" action="{{ url_for('login') }}">
        <input type="text" name="username" placeholder="Username" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="{{ url_for('register') }}">Click here to Register</a></p>
</body>
</html>
